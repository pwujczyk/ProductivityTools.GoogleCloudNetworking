name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install and Build
        run: npm install && npm run build

      - name: Deploy to Firebase Hosting Live
        run: npx firebase-tools deploy --only hosting --project ptprojectsweb --json
        env:
          # Podwójny cudzysłów chroni strukturę JSON-a przed uszkodzeniem w bashu
          GOOGLE_APPLICATION_CREDENTIALS_JSON: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_PTPROJECTSWEB }}"